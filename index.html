<style>
:root{
  --bg:#0B1220; --bg-grad-a:#0B1220; --bg-grad-b:#0E1A2E;
  --surface:#131E33; --surface-2:#18263F;
  --line:rgba(148,175,214,.14); --line-strong:rgba(148,175,214,.28);
  --text:#E7EEFA; --muted:#93A6C6; --faint:#5E718F;
  --mint:#5EEAD4; --cyan:#38BDF8; --accent:#5EEAD4; --accent-2:#38BDF8;
  --danger:#FB7185; --warn:#FBBF24; --ok:#34D399;
  --dot:rgba(148,175,214,.07);
  --shadow:0 20px 60px -20px rgba(0,0,0,.65);
  --radius:18px; --radius-sm:12px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
html[data-theme="light"]{
  --bg:#EEF3FB; --bg-grad-a:#F5F8FD; --bg-grad-b:#E6EEFA;
  --surface:#FFFFFF; --surface-2:#F2F6FC;
  --line:rgba(30,58,95,.10); --line-strong:rgba(30,58,95,.20);
  --text:#0C1930; --muted:#516480; --faint:#8497B2;
  --mint:#0E9E8F; --cyan:#0284C7; --accent:#0E9E8F; --accent-2:#0284C7;
  --dot:rgba(30,58,95,.06);
  --shadow:0 22px 50px -24px rgba(20,45,90,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1100px 700px at 82% -8%, rgba(56,189,248,.10), transparent 60%),
    radial-gradient(900px 600px at 8% 108%, rgba(94,234,212,.08), transparent 60%),
    linear-gradient(160deg,var(--bg-grad-a),var(--bg-grad-b));
  min-height:100vh;-webkit-font-smoothing:antialiased;
  transition:background-color .5s var(--ease),color .35s var(--ease);
  padding-bottom:40px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(var(--dot) 1px,transparent 1px);
  background-size:26px 26px;
  mask-image:radial-gradient(ellipse at 50% 30%,#000 20%,transparent 75%);
}
main,header,footer{position:relative;z-index:1}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
a{color:inherit} button{font-family:inherit}
.wrap{max-width:1160px;margin:0 auto;padding:0 20px}

/* ---------- Navbar ---------- */
header.nav{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:color-mix(in srgb,var(--bg) 72%, transparent);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:66px;gap:8px}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;background:none;border:0;padding:0;color:inherit;min-width:0}
.brand .logo{width:38px;height:38px;flex:none}
.brand .name{font-weight:700;font-size:19px;letter-spacing:.2px;line-height:1;white-space:nowrap}
.brand .name b{color:var(--accent);font-weight:800}
.brand .name span{display:block;font-size:10.5px;font-weight:600;letter-spacing:2.4px;color:var(--faint);text-transform:uppercase;margin-top:3px}
@media(max-width:420px){.brand .name{font-size:16px}.brand .name span{letter-spacing:1.6px}}
.nav-actions{display:flex;align-items:center;gap:9px;flex:none}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;
  transition:transform .2s var(--ease),border-color .2s}
.icon-btn:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.icon-btn svg{width:20px;height:20px}
.lang-btn{width:auto;padding:0 13px;font-weight:800;font-size:12.5px;letter-spacing:1px;gap:7px;display:inline-flex;align-items:center}
.lang-btn svg{width:16px;height:16px;opacity:.75}
.ghost-link{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 15px;border-radius:12px;
  border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;
  font-weight:600;font-size:14px;text-decoration:none;transition:transform .2s var(--ease),border-color .2s}
.ghost-link:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.ghost-link svg{width:18px;height:18px}
@media(max-width:640px){.ghost-link{display:none}}

/* ---------- Hero ---------- */
.hero{padding:52px 0 30px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--accent);border:1px solid var(--line-strong);
  padding:7px 14px;border-radius:999px;background:var(--surface)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:beat 2.4s var(--ease) infinite}
@keyframes beat{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 60%,transparent)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}
.hero h1{font-size:clamp(30px,6vw,52px);line-height:1.05;margin:20px 0 12px;font-weight:800;letter-spacing:-1px}
.hero h1 .g{background:linear-gradient(100deg,var(--mint),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:560px;margin:0 auto;color:var(--muted);font-size:clamp(15px,2.2vw,18px);line-height:1.55}

/* ---------- Grid herramientas ---------- */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:34px 0 16px;gap:12px}
.section-head h2{font-size:15px;letter-spacing:.4px;margin:0;font-weight:700}
.section-head .hint{font-size:12.5px;color:var(--faint);text-align:right}
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}
.card{position:relative;text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--surface);
  border-radius:var(--radius);padding:18px 16px 16px;color:inherit;overflow:hidden;
  transition:transform .28s var(--ease),border-color .28s,box-shadow .28s;animation:rise .5s var(--ease) both}
.card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
  background:linear-gradient(140deg,transparent 40%,color-mix(in srgb,var(--accent) 55%,transparent));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .28s}
.card:hover{transform:translateY(-4px);border-color:transparent;box-shadow:var(--shadow)}
.card:hover::before{opacity:1}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.card .ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px;
  background:color-mix(in srgb,var(--accent) 12%,var(--surface-2));border:1px solid var(--line);color:var(--accent);
  transition:transform .3s var(--ease)}
.card:hover .ico{transform:scale(1.08) rotate(-3deg)}
.card .ico svg{width:23px;height:23px}
.card h3{margin:0 0 3px;font-size:15px;font-weight:700}
.card small{color:var(--faint);font-size:12px;line-height:1.35;display:block}
.card .star{position:absolute;top:12px;right:14px;font-size:11px;color:var(--warn)}
.card.soon{opacity:.6}
.tag-soon{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;letter-spacing:.5px;
  color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);
  padding:2px 7px;border-radius:999px;text-transform:uppercase}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ---------- Vista de herramienta ---------- */
.hidden{display:none!important}
.toolview{animation:fade .4s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:0;color:var(--muted);
  cursor:pointer;font-size:14px;font-weight:600;padding:8px 4px;margin:10px 0 4px}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:17px;height:17px}
.tool-title{display:flex;align-items:center;gap:14px;margin:6px 0 22px}
.tool-title .ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:none;
  background:color-mix(in srgb,var(--accent) 12%,var(--surface-2));border:1px solid var(--line);color:var(--accent)}
.tool-title .ico svg{width:26px;height:26px}
.tool-title h2{margin:0;font-size:24px;font-weight:800;letter-spacing:-.3px}
.tool-title p{margin:2px 0 0;color:var(--muted);font-size:14px}

/* ---------- Dropzone ---------- */
.dropzone{position:relative;border:2px dashed var(--line-strong);border-radius:22px;
  background:var(--surface);padding:54px 24px;text-align:center;cursor:pointer;overflow:hidden;
  transition:border-color .3s,background .3s,transform .3s var(--ease)}
.dropzone::after{content:"";position:absolute;inset:-40%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,color-mix(in srgb,var(--accent) 14%,transparent),transparent 62%);
  opacity:.5;animation:pulseGlow 5s var(--ease) infinite}
@keyframes pulseGlow{0%,100%{transform:scale(.85);opacity:.28}50%{transform:scale(1.05);opacity:.55}}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);transform:translateY(-2px)}
.dropzone.drag{background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
.dz-inner{position:relative;z-index:1}
.dz-orb{width:78px;height:78px;margin:0 auto 20px;border-radius:22px;display:grid;place-items:center;
  background:linear-gradient(140deg,color-mix(in srgb,var(--mint) 22%,var(--surface-2)),color-mix(in srgb,var(--cyan) 18%,var(--surface-2)));
  border:1px solid var(--line-strong);color:var(--accent);animation:float 4.5s var(--ease) infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.dz-orb svg{width:36px;height:36px}
.dropzone h3{margin:0 0 6px;font-size:19px;font-weight:700}
.dropzone .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
.btn-primary{display:inline-flex;align-items:center;gap:10px;cursor:pointer;border:0;
  padding:14px 26px;border-radius:14px;font-weight:700;font-size:15px;color:#04121a;
  background:linear-gradient(100deg,var(--mint),var(--cyan));
  box-shadow:0 12px 30px -10px color-mix(in srgb,var(--cyan) 55%,transparent);
  transition:transform .2s var(--ease),filter .2s}
.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.06)}
.btn-primary:active{transform:translateY(0)}
.btn-primary svg{width:19px;height:19px}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.dz-tos{margin-top:16px;font-size:12px;color:var(--faint)}
.cloud-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.cloud-btn{display:inline-flex;align-items:center;gap:9px;cursor:pointer;
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  padding:11px 16px;border-radius:12px;font-weight:600;font-size:13.5px;
  transition:transform .2s var(--ease),border-color .2s}
.cloud-btn:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.cloud-btn svg{width:18px;height:18px}
.privacy{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:26px;color:var(--faint);font-size:12.5px;text-align:center}
.privacy svg{width:15px;height:15px;color:var(--ok);flex:none}

/* ---------- Paneles ---------- */
.panel{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:20px;margin-top:16px;animation:fade .35s var(--ease)}
.file-list{display:flex;flex-direction:column;gap:8px;margin:6px 0 4px}
.file-item{display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;font-size:14px}
.file-item .fi-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);flex:none}
.file-item .fi-ico svg{width:16px;height:16px}
.file-item .fi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.file-item .fi-size{color:var(--faint);font-size:12px;white-space:nowrap}
.file-item .fi-x{background:none;border:0;color:var(--faint);cursor:pointer;padding:4px;border-radius:6px}
.file-item .fi-x:hover{color:var(--danger)}
.file-item .fi-x svg{width:15px;height:15px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:14px 0}
.opt{border:1px solid var(--line);background:var(--surface-2);border-radius:12px;padding:14px;cursor:pointer;
  text-align:center;font-weight:600;transition:transform .2s var(--ease),border-color .2s;color:inherit}
.opt:hover{transform:translateY(-2px)}
.opt.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--surface-2))}
.field{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0}
.field label{font-size:13px;color:var(--muted)}
.field input{background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:10px 12px;font-size:14px;width:96px}
.field input:focus{outline:2px solid var(--accent);outline-offset:1px}
.panel-note{color:var(--muted);font-size:13.5px;margin:14px 2px 4px;line-height:1.5}
.panel-hint{color:var(--faint);font-size:12.5px;margin:12px 2px;line-height:1.45}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:18px;
  background:rgba(6,12,22,.62);backdrop-filter:blur(6px);animation:fade .25s var(--ease)}
.modal{width:min(480px,100%);background:var(--surface);border:1px solid var(--line-strong);
  border-radius:24px;box-shadow:var(--shadow);padding:26px;position:relative;
  animation:pop .34s var(--ease);max-height:90vh;overflow:auto}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal .m-close{position:absolute;top:16px;right:16px}
.m-file{display:flex;align-items:center;gap:13px;margin-bottom:20px;padding-right:44px}
.m-file .mf-ico{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none;
  background:color-mix(in srgb,var(--accent) 12%,var(--surface-2));border:1px solid var(--line);color:var(--accent)}
.m-file .mf-ico svg{width:24px;height:24px}
.m-file .mf-name{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-file .mf-size{color:var(--muted);font-size:13px;margin-top:2px}
.m-q{font-size:20px;font-weight:800;letter-spacing:-.3px;margin:0 0 4px}
.m-sub{color:var(--muted);font-size:13.5px;margin:0 0 18px;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:flex;align-items:center;justify-content:space-between;gap:14px;cursor:pointer;
  border:1px solid var(--line);background:var(--surface-2);border-radius:14px;padding:15px 16px;
  color:inherit;text-align:left;transition:transform .18s var(--ease),border-color .18s,background .18s}
.choice:hover{transform:translateY(-2px);border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--surface-2))}
.choice .c-wrap{display:flex;flex-direction:column;gap:3px;min-width:0}
.choice .c-main{font-weight:700;font-size:15px;display:block}
.choice .c-desc{font-size:12.5px;color:var(--faint);display:block}
.choice .c-badge{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;flex:none}
.choice.max .c-badge{color:var(--warn)}
.keep-text{display:flex;align-items:flex-start;gap:10px;margin:16px 2px 2px;font-size:13px;color:var(--muted);cursor:pointer;line-height:1.4}
.keep-text input{width:18px;height:18px;accent-color:var(--accent);flex:none;margin-top:1px}
.quality-note{display:flex;gap:9px;align-items:flex-start;margin-top:16px;padding:12px 13px;border-radius:12px;
  background:color-mix(in srgb,var(--ok) 9%,var(--surface-2));border:1px solid color-mix(in srgb,var(--ok) 22%,transparent);
  font-size:12.5px;color:var(--muted);line-height:1.45}
.quality-note svg{width:17px;height:17px;color:var(--ok);flex:none;margin-top:1px}
.progress-box{text-align:center;padding:14px 0}
.spinner{width:52px;height:52px;margin:6px auto 18px}
.spinner svg{width:100%;height:100%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-label{font-weight:700;font-size:16px;margin-bottom:6px}
.prog-sub{color:var(--muted);font-size:13px}
.bar{height:8px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;margin-top:18px}
.bar>i{display:block;height:100%;width:30%;border-radius:99px;background:linear-gradient(90deg,var(--mint),var(--cyan));transition:width .3s var(--ease)}
.result-ring{display:flex;align-items:center;justify-content:center;gap:22px;margin:4px 0 20px;flex-wrap:wrap}
.ring{position:relative;width:120px;height:120px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring .pct b{font-size:26px;font-weight:800;display:block;line-height:1}
.ring .pct span{font-size:10px;color:var(--muted);letter-spacing:.5px}
.sizes{display:flex;flex-direction:column;gap:12px;flex:1;min-width:180px}
.size-row{display:flex;justify-content:space-between;align-items:center;font-size:14px}
.size-row .lbl{color:var(--muted)}
.size-row .val{font-weight:700}
.size-row .val.new{color:var(--ok)}
.divider{height:1px;background:var(--line);margin:6px 0}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.btn-line{display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);border-radius:13px;
  padding:13px;font-weight:700;font-size:14.5px;transition:transform .18s var(--ease),border-color .18s}
.btn-line:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.btn-line svg{width:18px;height:18px}
.maxed{display:flex;gap:11px;align-items:flex-start;padding:15px;border-radius:14px;
  background:color-mix(in srgb,var(--warn) 10%,var(--surface-2));border:1px solid color-mix(in srgb,var(--warn) 30%,transparent);
  font-size:13.5px;color:var(--text);line-height:1.5}
.maxed svg{width:20px;height:20px;color:var(--warn);flex:none;margin-top:1px}
.attempt-chip{display:inline-block;font-size:11px;color:var(--faint);margin-top:12px}

/* ---------- Toast ---------- */
#toasts{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:10px;align-items:center;width:max-content;max-width:92vw}
.toast{background:var(--surface);border:1px solid var(--line-strong);color:var(--text);
  padding:12px 18px;border-radius:14px;font-size:13.5px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:10px;animation:pop .3s var(--ease)}
.toast svg{width:17px;height:17px;color:var(--accent);flex:none}

/* ---------- Botón flotante de apoyo ---------- */
#supportFab{position:fixed;right:20px;bottom:22px;z-index:50;
  display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  padding:13px 20px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  background:linear-gradient(100deg,color-mix(in srgb,var(--mint) 20%,var(--surface)),color-mix(in srgb,var(--cyan) 16%,var(--surface)));
  color:var(--text);font-weight:700;font-size:14px;
  box-shadow:0 16px 40px -14px color-mix(in srgb,var(--cyan) 60%,transparent);
  backdrop-filter:blur(10px);animation:fabIn .6s var(--ease) .4s both;
  transition:transform .25s var(--ease),box-shadow .25s}
#supportFab:hover{transform:translateY(-3px);box-shadow:0 22px 50px -14px color-mix(in srgb,var(--cyan) 70%,transparent)}
#supportFab .heart{width:20px;height:20px;color:var(--danger);flex:none;animation:heart 2.6s var(--ease) infinite}
@keyframes heart{0%,100%{transform:scale(1)}12%{transform:scale(1.22)}24%{transform:scale(1)}36%{transform:scale(1.16)}}
@keyframes fabIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:none}}
@media(max-width:560px){#supportFab .fab-lbl{display:none}
  #supportFab{padding:0;width:56px;height:56px;justify-content:center;right:16px;bottom:20px}}

/* ---------- Modal donación ---------- */
.donate-head{text-align:center;margin-bottom:4px}
.donate-head .d-emoji{font-size:34px;line-height:1;display:block;margin-bottom:10px;animation:float 4s var(--ease) infinite}
.donate-head h3{font-size:21px;font-weight:800;letter-spacing:-.3px;margin:0 0 6px}
.donate-head p{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0 auto 18px;max-width:340px}
.pay-tabs{display:grid;grid-template-columns:repeat(var(--tabs,4),1fr);gap:6px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:16px}
.pay-tab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:10px;
  border:0;background:none;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;
  transition:background .2s,color .2s}
.pay-tab svg{width:19px;height:19px}
.pay-tab:hover{color:var(--text)}
.pay-tab.on{background:color-mix(in srgb,var(--accent) 14%,var(--surface));color:var(--text)}
.pay-body{animation:fade .28s var(--ease)}
.pay-link{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  padding:15px;border-radius:14px;border:0;cursor:pointer;font-weight:700;font-size:15px;color:#04121a;
  text-decoration:none;background:linear-gradient(100deg,var(--mint),var(--cyan));
  box-shadow:0 12px 30px -12px color-mix(in srgb,var(--cyan) 55%,transparent);
  transition:transform .2s var(--ease),filter .2s}
.pay-link:hover{transform:translateY(-2px);filter:brightness(1.06)}
.pay-link svg{width:19px;height:19px}
.pay-field{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:9px}
.pay-field .pf-info{flex:1;min-width:0}
.pay-field .pf-k{font-size:11px;color:var(--faint);letter-spacing:.4px;text-transform:uppercase}
.pay-field .pf-v{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.pay-field .pf-copy{flex:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:var(--surface);color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:color .2s,transform .2s}
.pay-field .pf-copy:hover{color:var(--accent);transform:translateY(-1px)}
.pay-field .pf-copy svg{width:16px;height:16px}
.pay-note{font-size:12px;color:var(--faint);text-align:center;margin-top:12px;line-height:1.45}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 0 2px}
.qr-box img{width:min(240px,70vw);border-radius:16px;border:1px solid var(--line-strong);
  box-shadow:0 14px 34px -16px rgba(0,0,0,.5)}
.qr-box .qr-name{font-weight:800;font-size:15px}
.qr-box .qr-scan{font-size:13px;color:var(--muted);text-align:center}

footer{margin-top:44px;padding:26px 0;border-top:1px solid var(--line);color:var(--faint);font-size:13px;text-align:center}
footer b{color:var(--muted)}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

let lang = 'es';
function t(key, vars){
  let s = (L[lang] && L[lang][key]) || L.es[key] || key;
  if(vars) for(const k in vars) s = s.split('{'+k+'}').join(vars[k]);
  return s;
}
function toolName(id){ return (L[lang].tools[id]||L.es.tools[id])[0]; }
function toolDesc(id){ return (L[lang].tools[id]||L.es.tools[id])[1]; }

function detectLang(){
  const saved = load('mep_lang');
  if(saved && L[saved]) return saved;
  const nav = (navigator.language||'en').toLowerCase();
  if(nav.startsWith('es')) return 'es';
  if(nav.startsWith('pt')) return 'pt';
  return 'en';
}
function cycleLang(){
  const order = ['es','en','pt'];
  lang = order[(order.indexOf(lang)+1)%order.length];
  store('mep_lang', lang);
  applyLang();
  toast(lang.toUpperCase(), I.spark);
}
function applyLang(){
  document.documentElement.lang = lang;
  $('#langCode').textContent = lang.toUpperCase();
  $('#brandTag').textContent = t('brandTag');
  $('#navCode').textContent = t('navCode');
  $('#heroEyebrow').textContent = t('heroEyebrow');
  $('#h1a').textContent = t('h1a'); $('#h1b').textContent = t('h1b');
  $('#heroP').textContent = t('heroP');
  $('#secTools').textContent = t('secTools'); $('#secHint').textContent = t('secHint');
  $('#backLbl').textContent = t('back');
  $('#btnSelect').textContent = t('btnSelect');
  $('#driveLbl').textContent = t('drive');
  $('#tosLbl').textContent = t('tos');
  $('#privacyLbl').textContent = t('privacy');
  $('#footerLbl').innerHTML = t('footer');
  $('#fabLbl').textContent = t('fab');
  renderGrid();
  if(currentTool) refreshToolHeader();
}

const PAY_LABELS = { paypal:'PayPal', binance:'Binance', banco:'Banco', movil:'Pago Móvil' };

function payTabsAvailable(){
  const tabs = [];
  if(DONATE.paypal) tabs.push('paypal');
  if(DONATE.binanceQR) tabs.push('binance');
  if(DONATE.banco && DONATE.banco.numero) tabs.push('banco');
  if(DONATE.movil && DONATE.movil.telefono) tabs.push('movil');
  return tabs;
}
function openDonate(){
  const tabs = payTabsAvailable();
  if(!tabs.length) return;
  renderModal(`
    <button class="icon-btn m-close" onclick="closeModal()" aria-label="✕">${I.x}</button>
    <div class="donate-head">
      <span class="d-emoji">💜</span>
      <h3>${t('dTitle')}</h3>
      <p>${t('dBody')}</p>
    </div>
    <div class="pay-tabs" style="--tabs:${tabs.length}">
      ${tabs.map((k,i)=>`<button class="pay-tab ${i===0?'on':''}" data-pay="${k}" onclick="selPay('${k}')">${PAY_ICONS[k]}<span>${PAY_LABELS[k]}</span></button>`).join('')}
    </div>
    <div class="pay-body" id="payBody"></div>`);
  selPay(tabs[0]);
}
function selPay(k){
  document.querySelectorAll('.pay-tab').forEach(b=>b.classList.toggle('on', b.dataset.pay===k));
  const body = $('#payBody'); if(!body) return;
  if(k==='paypal'){
    body.innerHTML = `<a class="pay-link" href="${DONATE.paypal}" target="_blank" rel="noopener">${PAY_ICONS.paypal} ${t('dPaypal')}</a>
      <div class="pay-note">${t('dPaypalNote')}</div>`;
  } else if(k==='binance'){
    body.innerHTML = `<div class="qr-box">
        <div class="qr-scan">${t('dScan')}</div>
        <img src="${BINANCE_QR}" alt="Binance Pay QR" loading="lazy"/>
        <div class="qr-name">Mir Romero</div>
      </div>
      <div class="pay-note">${t('dBnbNote')}</div>`;
  } else if(k==='banco'){
    const b = DONATE.banco;
    body.innerHTML =
      payField(t('kBank'), b.banco) +
      payField(t('kType'), b.tipo) +
      payField(t('kAcc'), b.numero, true) +
      payField(t('kHolder'), b.titular) +
      payField(t('kId'), b.cedula, true);
  } else if(k==='movil'){
    const m = DONATE.movil;
    body.innerHTML =
      payField(t('kBank'), m.banco) +
      payField(t('kPhone'), m.telefono, true) +
      payField(t('kId'), m.cedula, true) +
      `<div class="pay-note">${t('dMovilNote')}</div>`;
  }
}
function payField(k,v,copy){
  return `<div class="pay-field">
    <div class="pf-info"><div class="pf-k">${k}</div><div class="pf-v">${escapeHtml(v)}</div></div>
    ${copy?`<button class="pf-copy" onclick="copyText('${String(v).replace(/'/g,"\\'")}')" aria-label="copy">${I.copy}</button>`:''}
  </div>`;
}
async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); toast(t('copied'), I.check); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast(t('copied'), I.check);}catch(_){ toast(t('copyManual',{t:txt}), I.warn); }
    ta.remove();
  }
}

const $ = s => document.querySelector(s);
function fmt(bytes){
  if(bytes < KB) return bytes + ' B';
  if(bytes < MB) return (bytes/KB).toFixed(0) + ' KB';
  return (bytes/MB).toFixed(2) + ' MB';
}
function fmtStep(bytes){ return bytes >= MB ? (bytes/MB)%1===0 ? (bytes/MB)+' MB' : (bytes/MB).toFixed(1)+' MB' : (bytes/KB)+' KB'; }
function toast(msg, icon){
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = (icon||I.spark) + '<span>'+msg+'</span>';
  $('#toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),300); }, 2600);
}
function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function gPickerCb(data){

    const files = [];

async function handleFiles(files){

  const f = files[0];

  const buf = new Uint8Array(await f.arrayBuffer());
  state.originalBytes = buf; state.originalSize = buf.byteLength;
  state.workingBytes = buf;  state.workingSize  = buf.byteLength;

  if(currentTool.id==='compress') openCompressModal();
  else if(currentTool.id==='split') renderSplitPanel();

/* ============================================================
   pdf.js — worker vía blob (compatible con hosting estático)
   ============================================================ */
async function ensurePdfjs(){
  if(pdfjsReady) return;
  if(!window.pdfjsLib) throw new Error('pdf.js');
  try{
    const res = await fetch('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js');
    const blob = new Blob([await res.text()],{type:'application/javascript'});
    pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
  }catch(e){
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  pdfjsReady = true;
}

/* ============================================================
   NÚCLEO DE COMPRESIÓN
   ============================================================ */
async function rasterize(bytes, preset, onPage){
  await ensurePdfjs();
  const doc = await pdfjsLib.getDocument({data: bytes.slice(0)}).promise;
  const out = await PDFLib.PDFDocument.create();
  const MAXDIM = 4000;
  for(let i=1;i<=doc.numPages;i++){
    const page = await doc.getPage(i);
    let scale = preset.scale;
    let vp = page.getViewport({scale});
    const big = Math.max(vp.width, vp.height);
    if(big > MAXDIM){ scale *= MAXDIM/big; vp = page.getViewport({scale}); }
    const canvas = document.createElement('canvas');
    canvas.width = Math.max(1,Math.floor(vp.width));
    canvas.height = Math.max(1,Math.floor(vp.height));
    const ctx = canvas.getContext('2d',{alpha:false});
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({canvasContext:ctx, viewport:vp}).promise;
    const blob = await new Promise(r=>canvas.toBlob(r,'image/jpeg',preset.quality));
    const img = await out.embedJpg(new Uint8Array(await blob.arrayBuffer()));
    const base = page.getViewport({scale:1});
    out.addPage([base.width,base.height]).drawImage(img,{x:0,y:0,width:base.width,height:base.height});
    canvas.width=0; canvas.height=0;
    if(onPage) onPage(i, doc.numPages);
  }
  await doc.destroy();
  return await out.save();
}
async function lightCompress(bytes){
  const doc = await PDFLib.PDFDocument.load(bytes.slice(0));
  return await doc.save({useObjectStreams:true, addDefaultPage:false});
}

/* ============================================================
   MODAL DE COMPRESIÓN — opciones adaptativas KB/MB
   ============================================================ */
function buildChoices(){
  const size = state.workingSize;
  const opts = [];
  const addStep = step=>{
    const target = size - step;
    if(target >= MIN_TARGET && step <= size*0.85)
      opts.push({label:t('less',{x:fmtStep(step)}), desc:t('would',{s:fmt(target)}), target, badge:'-'+fmtStep(step)});
  };
  if(size > 3*MB){
    /* archivo grande → pasos en MB */
    [5*MB, 2*MB, 1*MB].forEach(addStep);
    opts.push({label:t('to900'), desc:t('to900d'), target:900*KB, badge:'≤ 900 KB'});
  } else if(size > 900*KB){
    opts.push({label:t('to900'), desc:t('to900d'), target:900*KB, badge:'≤ 900 KB'});
    [500*KB, 400*KB].forEach(addStep);
  } else {
    [200*KB, 100*KB].forEach(addStep);
  }
  opts.push({label:t('maxC'), desc:t('maxCd'), target:1, max:true, badge:t('maxB')});
  return opts;
}

function openCompressModal(){
  state.presetIndex=-1; state.attempts=0; state.maxed=false;

}

async function startCompress(idx){
  const choice = window._choices[idx];
  if(state.keepText){
    renderProgress(t('pLight'), t('pLightSub'));
    try{ finishRound(await lightCompress(state.workingBytes), {light:true}); }
    catch(err){ renderError(err); }
    return;
  }
  renderProgress(t('pOpt'), t('pPrep'));
  try{
    let best=null, usedIndex=PRESETS.length-1;
    const target = choice.max ? 1 : choice.target;
    for(let p=0;p<PRESETS.length;p++){
      updateProgress(t('pOpt'), t('pTry',{n:p+1,q:Math.round(PRESETS[p].quality*100)}), (p+1)/PRESETS.length);
      const bytes = await rasterize(state.workingBytes, PRESETS[p]);
      best={bytes,index:p}; usedIndex=p;
      if(bytes.byteLength <= target) break;
    }
    state.presetIndex = usedIndex;
    finishRound(best.bytes, {});
  }catch(err){ renderError(err); }
}
async function compressAgain(){
  state.attempts++;
  if(state.attempts >= MAX_ATTEMPTS){ state.maxed=true; return renderMaxed(); }
  const next = Math.min(state.presetIndex+1, PRESETS.length-1);
  if(next===state.presetIndex){ state.maxed=true; return renderMaxed(); }
  state.presetIndex = next;
  renderProgress(t('pAgain'), t('pAgainSub'));
  try{
    const before = state.workingSize;
    const bytes = await rasterize(state.workingBytes, PRESETS[next],
      (i,n)=>updateProgress(t('pAgain'), t('pPage',{i,n}), i/n));
    if(bytes.byteLength >= before*0.98){ state.maxed=true; return renderMaxed(); }
    finishRound(bytes, {});
  }catch(err){ renderError(err); }
}
function finishRound(bytes, {light}){
  state.workingBytes = bytes; state.workingSize = bytes.byteLength;
  if(light && state.workingSize >= state.originalSize){
    return renderModal(`
      <button class="icon-btn m-close" onclick="closeModal()">${I.x}</button>
      <div class="maxed">${I.warn}<div>${t('lightFail')}</div></div>
      <div class="result-actions" style="margin-top:16px">
        <button class="btn-line" onclick="state.keepText=false;renderChoiceScreen()">${I.again} ${t('tryImg')}</button>
        <button class="btn-line" onclick="closeModal()">${t('close')}</button>
      </div>`);
  }
  const saved = state.originalSize - state.workingSize;
  const pct = Math.max(0, Math.round((saved/state.originalSize)*100));
  renderResult(pct, state.originalSize, state.workingSize, light);
}
function renderResult(pct, original, now, light){
  const R=52, C=2*Math.PI*R, off=C*(1-pct/100);
  const canMore = !state.maxed && !light && state.attempts < MAX_ATTEMPTS && state.presetIndex < PRESETS.length-1;
  renderModal(`
    <button class="icon-btn m-close" onclick="closeModal()" aria-label="✕">${I.x}</button>
    <h3 class="m-q" style="margin-bottom:16px">${t('done')} ${pct>0?t('lighterPct',{p:pct}):t('optimized')}</h3>
    <div class="result-ring">
      <div class="ring">
        <svg width="120" height="120">
          <circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="9"/>
          <circle cx="60" cy="60" r="${R}" fill="none" stroke="url(#rg)" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
          <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5EEAD4"/><stop offset="1" stop-color="#38BDF8"/></linearGradient></defs>
        </svg>
        <div class="pct"><b>${pct}%</b><span>${t('lighter')}</span></div>
      </div>
      <div class="sizes">
        <div class="size-row"><span class="lbl">${t('before')}</span><span class="val">${fmt(original)}</span></div>
        <div class="divider"></div>
        <div class="size-row"><span class="lbl">${t('now')}</span><span class="val new">${fmt(now)}</span></div>
        <div class="size-row"><span class="lbl">${t('saving')}</span><span class="val">${fmt(Math.max(0,original-now))}</span></div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-primary" style="justify-content:center;width:100%" onclick="downloadResult()">${I.download} ${t('dl')}</button>
      ${canMore?`<button class="btn-line" onclick="compressAgain()">${I.again} ${t('more')}</button>`:''}
    </div>
    ${light?'<div class="quality-note" style="margin-top:14px">'+I.check+'<div>'+t('textKept')+'</div></div>':''}
    <div class="attempt-chip">${t('pass',{a:state.attempts+1,m:MAX_ATTEMPTS})}</div>`);
}
function renderMaxed(){
  const original = state.originalSize, now = state.workingSize;
  const pct = Math.max(0, Math.round((1-now/original)*100));
  renderModal(`
    <button class="icon-btn m-close" onclick="closeModal()" aria-label="✕">${I.x}</button>
    <div class="maxed">${I.warn}<div><b>${t('maxedT')}</b><br>${t('maxedB')}</div></div>

    <div class="result-actions" style="margin-top:14px">

function removeAt(i, kind){
  state.files.splice(i,1);

async function doMerge(){
  if(state.files.length<2){ toast(t('mergeMin'), I.warn); return; }
  toast(t('merging'), I.merge);
  try{
    const out = await PDFLib.PDFDocument.create();
    for(const f of state.files){
      const src = await PDFLib.PDFDocument.load(new Uint8Array(await f.arrayBuffer()));
      (await out.copyPages(src, src.getPageIndices())).forEach(pg=>out.addPage(pg));
    }
    saveBlob(new Blob([await out.save()],{type:'application/pdf'}), 'merged.pdf');
    toast(t('merged'), I.check);
  }catch(err){ toast(t('errT')+': '+err.message, I.warn); }

async function doSplit(n){
  const a=parseInt($('#spFrom').value,10), b=parseInt($('#spTo').value,10);
  if(isNaN(a)||isNaN(b)||a<1||b>n||a>b){ toast(t('badRange'), I.warn); return; }
  try{
    const src = await PDFLib.PDFDocument.load(state.originalBytes.slice(0));
    const out = await PDFLib.PDFDocument.create();
    const idx=[]; for(let i=a-1;i<b;i++) idx.push(i);
    (await out.copyPages(src, idx)).forEach(pg=>out.addPage(pg));
    saveBlob(new Blob([await out.save()],{type:'application/pdf'}), `${state.lastName}-${t('pagesWord')}${a}-${b}.pdf`);
    toast(t('splitDone'), I.check);
  }catch(err){ toast(t('errT')+': '+err.message, I.warn); }
}

function selRot(d){ state._rot=d; document.querySelectorAll('.opt[data-deg]').forEach(o=>o.classList.toggle('sel', +o.dataset.deg===d)); }
async function doRotate(){
  try{
    const doc = await PDFLib.PDFDocument.load(state.originalBytes.slice(0));
    doc.getPages().forEach(pg=>pg.setRotation(PDFLib.degrees((pg.getRotation().angle + state._rot) % 360)));
    saveBlob(new Blob([await doc.save()],{type:'application/pdf'}), `${state.lastName}-${t('rotated')}.pdf`);
    toast(t('rotDone'), I.check);
  }catch(err){ toast(t('errT')+': '+err.message, I.warn); }
}

/* --- Imágenes a PDF --- */
function renderImg2PdfPanel(){
  const p = $('#toolPanel');
  if(!state.files.length){ p.innerHTML=''; return; }
  p.innerHTML = `<div class="panel">
    <div class="file-list">${state.files.map((f,i)=>fileItemHtml(f.name,f.size,`removeAt(${i},'img')`)).join('')}</div>
    <p class="panel-hint">${t('i2pOrder')}</p>
    <button class="btn-primary" style="justify-content:center;width:100%" onclick="doImg2Pdf()">${I.images} ${t('i2pBtn',{n:state.files.length})}</button>
  </div>`;
}
async function doImg2Pdf(){
  if(!state.files.length){ toast(t('i2pMin'), I.warn); return; }
  renderProgress(t('i2pProg'), '');
  try{
    const out = await PDFLib.PDFDocument.create();
    for(let i=0;i<state.files.length;i++){
      updateProgress(t('i2pProg'), t('i2pImg',{i:i+1,n:state.files.length}), (i+1)/state.files.length);
      const f = state.files[i];
      const bytes = new Uint8Array(await f.arrayBuffer());
      let img;
      if(f.type==='image/png'){ img = await out.embedPng(bytes); }
      else if(f.type==='image/jpeg'){ img = await out.embedJpg(bytes); }
      else{
        /* otros formatos (webp, etc.) → re-codificar a JPEG vía canvas */
        const bmp = await createImageBitmap(new Blob([bytes],{type:f.type}));
        const canvas = document.createElement('canvas');
        canvas.width=bmp.width; canvas.height=bmp.height;
        const ctx = canvas.getContext('2d',{alpha:false});
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(bmp,0,0);
        const blob = await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.92));
        img = await out.embedJpg(new Uint8Array(await blob.arrayBuffer()));
        canvas.width=0; canvas.height=0;
      }
      /* límite razonable de página para que abra bien en visores */
      const MAXPT = 1600;
      let w=img.width, h=img.height;
      const big = Math.max(w,h);
      if(big > MAXPT){ const k = MAXPT/big; w*=k; h*=k; }
      out.addPage([w,h]).drawImage(img,{x:0,y:0,width:w,height:h});
    }
    closeModal();
    saveBlob(new Blob([await out.save()],{type:'application/pdf'}), 'images.pdf');
    toast(t('i2pDone'), I.check);
  }catch(err){ renderError(err); }
}

/* --- PDF a imágenes (ZIP si hay varias páginas) --- */
function renderPdf2ImgPanel(){
  ensurePdfjs().then(()=>pdfjsLib.getDocument({data:state.originalBytes.slice(0)}).promise).then(doc=>{
    const n = doc.numPages; state.pageCount = n; doc.destroy();
    $('#toolPanel').innerHTML = `<div class="panel">
      ${fileItemHtml(state.lastName+'.pdf', state.originalSize)}
      <p class="panel-note">${t('p2iInfo',{n})}</p>
      <button class="btn-primary" style="justify-content:center;width:100%" onclick="doPdf2Img()">${I.pdf2img} ${t('p2iBtn')}</button>
    </div>`;
  }).catch(err=>renderError(err));
}
async function doPdf2Img(){
  renderProgress(t('p2iProg'), '');
  try{
    await ensurePdfjs();
    const doc = await pdfjsLib.getDocument({data:state.originalBytes.slice(0)}).promise;
    const n = doc.numPages;
    const images = [];
    for(let i=1;i<=n;i++){
      updateProgress(t('p2iProg'), t('pPage',{i,n}), i/(n+1));
      const page = await doc.getPage(i);
      let vp = page.getViewport({scale:2.0});
      const big = Math.max(vp.width,vp.height);
      if(big>4000){ vp = page.getViewport({scale:2.0*4000/big}); }
      const canvas = document.createElement('canvas');
      canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height);
      const ctx = canvas.getContext('2d',{alpha:false});
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
      await page.render({canvasContext:ctx, viewport:vp}).promise;
      const blob = await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.9));
      images.push(blob);
      canvas.width=0; canvas.height=0;
    }
    await doc.destroy();
    if(images.length===1){
      closeModal();
      saveBlob(images[0], state.lastName+'.jpg');
    } else {
      updateProgress(t('p2iZip'), '', 0.95);
      const zip = new JSZip();
      const pad = String(images.length).length;
      for(let i=0;i<images.length;i++){
        zip.file(state.lastName+'-'+String(i+1).padStart(pad,'0')+'.jpg', images[i]);
      }
      const zblob = await zip.generateAsync({type:'blob'});
      closeModal();
      saveBlob(zblob, state.lastName+'-jpg.zip');
    }
    toast(t('p2iDone'), I.check);
  }catch(err){ renderError(err); }
}

/* --- Números de página --- */
function renderNumbersPanel(){
  PDFLib.PDFDocument.load(state.originalBytes.slice(0)).then(doc=>{
    const n = doc.getPageCount(); state.pageCount = n; state._numPos='C';
    $('#toolPanel').innerHTML = `<div class="panel">
      ${fileItemHtml(state.lastName+'.pdf', state.originalSize)}
      <p class="panel-note">${t('numInfo')}</p>
      <p class="panel-hint" style="margin-bottom:4px">${t('numPos')}</p>
      <div class="opt-grid">
        <button class="opt" data-pos="L" onclick="selPos('L')">${t('posL')}</button>
        <button class="opt sel" data-pos="C" onclick="selPos('C')">${t('posC')}</button>
        <button class="opt" data-pos="R" onclick="selPos('R')">${t('posR')}</button>
      </div>
      <div class="field">
        <label>${t('numStart')}</label><input id="numStart" type="number" min="1" value="1">
      </div>
      <button class="btn-primary" style="justify-content:center;width:100%" onclick="doNumbers()">${I.numbers} ${t('numBtn')}</button>
    </div>`;
  }).catch(err=>renderError(err));
}
function selPos(p){ state._numPos=p; document.querySelectorAll('.opt[data-pos]').forEach(o=>o.classList.toggle('sel', o.dataset.pos===p)); }
async function doNumbers(){
  try{
    const start = Math.max(1, parseInt($('#numStart').value,10)||1);
    const doc = await PDFLib.PDFDocument.load(state.originalBytes.slice(0));
    const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);
    const size = 11, margin = 40, y = 26;
    doc.getPages().forEach((pg,i)=>{
      const label = String(start+i);
      const tw = font.widthOfTextAtSize(label,size);
      const w = pg.getWidth();
      const x = state._numPos==='L' ? margin : state._numPos==='R' ? w-margin-tw : (w-tw)/2;
      pg.drawText(label,{x,y,size,font,color:PDFLib.rgb(0.25,0.29,0.36)});
    });
    saveBlob(new Blob([await doc.save()],{type:'application/pdf'}), `${state.lastName}-${t('numbered')}.pdf`);
    toast(t('numDone'), I.check);
  }catch(err){ toast(t('errT')+': '+err.message, I.warn); }
}

/* ============================================================
   MODAL / PROGRESO / ERROR / DESCARGA
   ============================================================ */
function renderModal(inner){
  $('#modalRoot').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}
function closeModal(){ $('#modalRoot').innerHTML=''; }
function renderProgress(label, sub){
  renderModal(`
    <div class="progress-box">
      <div class="spinner"><svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="var(--surface-2)" stroke-width="5"/><circle cx="25" cy="25" r="20" fill="none" stroke="url(#sg)" stroke-width="5" stroke-linecap="round" stroke-dasharray="90 150"/><defs><linearGradient id="sg"><stop stop-color="#5EEAD4"/><stop offset="1" stop-color="#38BDF8"/></linearGradient></defs></svg></div>
      <div class="prog-label" id="pgLabel">${label}</div>
      <div class="prog-sub" id="pgSub">${sub||''}</div>
      <div class="bar"><i id="pgBar" style="width:15%"></i></div>
    </div>`);
}
function updateProgress(label, sub, frac){
  const l=$('#pgLabel'), s=$('#pgSub'), b=$('#pgBar');
  if(l&&label) l.textContent=label;
  if(s&&sub!=null) s.textContent=sub;
  if(b&&frac!=null) b.style.width=Math.min(100,Math.round(frac*100))+'%';
}
function renderError(err){
  renderModal(`
    <button class="icon-btn m-close" onclick="closeModal()">${I.x}</button>
    <div class="maxed">${I.warn}<div><b>${t('errT')}</b><br>${escapeHtml(err&&err.message||'')} ${t('errB')}</div></div>
    <div class="result-actions" style="margin-top:14px"><button class="btn-line" onclick="closeModal()">${t('close')}</button></div>`);
}
function saveBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

   INIT
   ============================================================ */
const savedTheme = load('mep_theme');
if(savedTheme==='light'||savedTheme==='dark') document.documentElement.setAttribute('data-theme', savedTheme);
lang = detectLang();
applyLang();
setThemeIcon();
window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
